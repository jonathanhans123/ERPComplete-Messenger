name: erpcomplete_messenger
description: ERPComplete Messenger — Flutter app for chat and LiveKit video.
publish_to: none
version: 0.1.1+2

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_secure_storage: ^9.2.2
  http: ^1.2.0
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  provider: ^6.1.2
  uuid: ^4.5.1
  livekit_client: ^2.3.1
  audio_waveforms: ^1.3.0
  file_picker: 8.3.7
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  audioplayers: ^6.1.0
  cached_network_image: ^3.4.1
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
